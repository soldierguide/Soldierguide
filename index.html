<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoldierGuide Full System</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
    display:flex;
}

/* Sidebar */
.sidebar{
    width:240px;
    height:100vh;
    background:#111827;
    padding:20px;
    position:fixed;
}

.logo{
    font-size:22px;
    color:#38bdf8;
    font-weight:bold;
    margin-bottom:20px;
}

button{
    width:100%;
    padding:12px;
    margin:6px 0;
    background:#1f2937;
    border:none;
    color:white;
    text-align:left;
    border-radius:8px;
    cursor:pointer;
}

button:hover{background:#38bdf8;color:black}

/* Main */
.main{
    margin-left:250px;
    padding:20px;
    width:100%;
}

.card{
    background:#1e293b;
    padding:15px;
    margin:10px;
    border-radius:10px;
}

.price{color:#22c55e}

/* Login */
.modal{
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
}

.box{
    background:white;
    color:black;
    padding:20px;
    width:300px;
    border-radius:10px;
}
input{
    width:100%;
    padding:10px;
    margin:8px 0;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<div class="logo">🎖 SoldierGuide</div>

<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('courses')">Courses</button>
<button onclick="show('notifications')">Notifications</button>
<button onclick="openLogin()">Login</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- DASHBOARD -->
<div id="dashboard">
<h2>Welcome Soldier 💂</h2>
<div class="card">Latest NDA / Airforce updates will appear here</div>
</div>

<!-- COURSES -->
<div id="courses" style="display:none">
<h2>Courses</h2>

<div class="card">
<h3>Silver</h3>
<p>Basic Study Material</p>
<div class="price">₹499</div>
<button onclick="pay('Silver',499)">Buy</button>
</div>

<div class="card">
<h3>Gold</h3>
<p>Mocks + Advanced Notes</p>
<div class="price">₹599</div>
<button onclick="pay('Gold',599)">Buy</button>
</div>

<div class="card">
<h3>Diamond</h3>
<p>Live + Full Access</p>
<div class="price">₹699</div>
<button onclick="pay('Diamond',699)">Buy</button>
</div>

</div>

<!-- NOTIFICATIONS -->
<div id="notifications" style="display:none">
<h2>Notifications</h2>
<div class="card">📢 NDA form coming soon</div>
<div class="card">📢 Airforce X Group update released</div>
</div>

</div>

<!-- LOGIN -->
<div class="modal" id="loginModal">
<div class="box">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<script>

/* ---------------- FIREBASE CONFIG ---------------- */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* ---------------- NAV ---------------- */
function show(id){
    document.querySelectorAll('.main > div').forEach(e=>e.style.display="none");
    document.getElementById(id).style.display="block";
}

/* ---------------- LOGIN ---------------- */
function openLogin(){
    document.getElementById("loginModal").style.display="flex";
}

function login(){
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, pass)
    .then(()=>{
        alert("Login Success ✅");
        document.getElementById("loginModal").style.display="none";
    })
    .catch(err=>alert(err.message));
}

/* ---------------- PAYMENT (RAZORPAY) ---------------- */
function pay(plan, amount){

    var options = {
        key: "YOUR_RAZORPAY_KEY",
        amount: amount * 100,
        currency: "INR",
        name: "SoldierGuide",
        description: plan + " Plan",
        handler: function(response){
            alert("Payment Success ✅ " + response.razorpay_payment_id);

            // Save to Firebase
            db.collection("payments").add({
                plan: plan,
                amount: amount,
                paymentId: response.razorpay_payment_id
            });
        }
    };

    var rzp = new Razorpay(options);
    rzp.open();
}

</script>

<!-- Razorpay -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

</body>
</html>
